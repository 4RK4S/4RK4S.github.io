<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>4RK4S</title>
  <meta name="description" content="4RK4S - Python Developer, Discord Bots, Automation, Web Tools" />

  <style>
    :root {
      --bg: #12021f;
      --bg-dark: #08010f;
      --panel: rgba(23, 4, 38, 0.92);
      --panel-dark: rgba(12, 2, 22, 0.96);
      --border: rgba(190, 112, 255, 0.45);
      --border-strong: rgba(207, 143, 255, 0.75);
      --text: #f4e4ff;
      --muted: #cfa7ff;
      --primary: #b56cff;
      --primary-2: #7c3aed;
      --glow: rgba(181, 108, 255, 0.35);
      --green: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Consolas, "Courier New", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(124, 58, 237, 0.24), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(181, 108, 255, 0.14), transparent 35%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-dark) 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 100% 4px;
      opacity: 0.16;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 32%, rgba(255,255,255,0.08) 0 1px, transparent 2px),
        radial-gradient(circle at 74% 18%, rgba(255,255,255,0.06) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 72%, rgba(255,255,255,0.05) 0 1px, transparent 2px),
        radial-gradient(circle at 35% 83%, rgba(255,255,255,0.05) 0 1px, transparent 2px);
      opacity: 0.5;
    }

    .page {
      min-height: 100vh;
      padding: 36px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .terminal {
      position: relative;
      width: 100%;
      max-width: 1180px;
      min-height: 760px;
      border: 2px solid rgba(194, 119, 255, 0.42);
      background:
        linear-gradient(180deg, rgba(48, 10, 76, 0.72), rgba(20, 4, 34, 0.84)),
        rgba(18, 3, 30, 0.82);
      box-shadow:
        0 0 0 1px rgba(217, 166, 255, 0.08) inset,
        0 0 34px rgba(181, 108, 255, 0.18);
      overflow: hidden;
    }

    .terminal-header {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid rgba(214, 151, 255, 0.24);
      background: rgba(7, 1, 13, 0.92);
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #8b5cf6;
      box-shadow: 0 0 10px rgba(181, 108, 255, 0.65);
    }

    .terminal-title {
      margin-left: 14px;
      color: #d8b4fe;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .terminal-body {
      position: relative;
      min-height: calc(760px - 44px);
      padding: 68px 24px 58px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .command-box {
      width: min(100%, 760px);
      padding: 18px 22px;
      margin-bottom: 42px;
      background: rgba(23, 3, 40, 0.94);
      border: 1px solid rgba(197, 125, 255, 0.36);
      box-shadow:
        0 0 18px rgba(181, 108, 255, 0.18),
        0 0 36px rgba(181, 108, 255, 0.08);
    }

    .prompt-small {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .prompt-line {
      min-height: 35px;
      color: var(--primary);
      font-size: clamp(18px, 2.2vw, 26px);
      word-break: break-word;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.1em;
      margin-left: 6px;
      vertical-align: middle;
      background: rgba(197, 125, 255, 0.9);
      box-shadow: 0 0 12px rgba(197, 125, 255, 0.7);
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .content {
      width: min(100%, 760px);
    }

    .brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .brand h1 {
      margin: 0 0 14px;
      color: rgba(224, 177, 255, 0.18);
      text-shadow: 0 0 14px rgba(181, 108, 255, 0.08);
      font-size: clamp(54px, 10vw, 94px);
      line-height: 1;
      letter-spacing: 3px;
      user-select: none;
    }

    .brand p {
      margin: 0;
      color: #ead7ff;
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.6;
    }

    .section-label {
      margin: 28px 0 12px;
      color: #d8b4fe;
      font-size: 13px;
    }

    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .menu-link {
      min-height: 62px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      background: var(--panel-dark);
      border: 1px solid rgba(201, 133, 255, 0.36);
      transition: 0.18s ease;
    }

    .menu-link:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      background: rgba(31, 7, 50, 0.98);
      box-shadow: 0 0 18px rgba(181, 108, 255, 0.22);
    }

    .menu-link.full {
      grid-column: 1 / -1;
    }

    .icon {
      width: 24px;
      color: #deb7ff;
      font-size: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .label {
      font-size: 18px;
    }

    .hint {
      margin-top: 22px;
      padding: 14px 16px;
      color: #cfa7ff;
      background: rgba(13, 2, 24, 0.68);
      border: 1px solid rgba(201, 133, 255, 0.22);
      font-size: 13px;
      line-height: 1.6;
    }

    .corner-tl,
    .corner-tr,
    .corner-bl,
    .corner-br {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #c084fc;
      opacity: 0.76;
      z-index: 3;
    }

    .corner-tl {
      top: 22px;
      left: 22px;
      border-top: 3px solid;
      border-left: 3px solid;
    }

    .corner-tr {
      top: 22px;
      right: 22px;
      border-top: 3px solid;
      border-right: 3px solid;
    }

    .corner-bl {
      bottom: 22px;
      left: 22px;
      border-bottom: 3px solid;
      border-left: 3px solid;
    }

    .corner-br {
      bottom: 22px;
      right: 22px;
      border-bottom: 3px solid;
      border-right: 3px solid;
    }

    @media (max-width: 860px) {
      .terminal {
        min-height: auto;
      }

      .terminal-body {
        min-height: auto;
        padding: 58px 18px 50px;
      }

      .menu {
        grid-template-columns: 1fr;
      }

      .menu-link.full {
        grid-column: auto;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 16px 10px;
      }

      .terminal-header {
        padding: 0 12px;
      }

      .terminal-title {
        font-size: 12px;
      }

      .brand h1 {
        font-size: 48px;
      }

      .label {
        font-size: 16px;
      }

      .prompt-line {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="terminal">
      <span class="corner-tl"></span>
      <span class="corner-tr"></span>
      <span class="corner-bl"></span>
      <span class="corner-br"></span>

      <header class="terminal-header">
        <div class="dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div class="terminal-title">root@4rk4s ~ terminal</div>
      </header>

      <div class="terminal-body">
        <div class="command-box">
          <div class="prompt-small">arkas@terminal:~$</div>
          <div class="prompt-line" id="typing-line"></div>
        </div>

        <div class="content">
          <section class="brand">
            <h1>4RK4S</h1>
            <p>Python Developer • Discord Bots • Automation • Web Tools</p>
          </section>

          <div class="section-label">$ ls -la /links/*</div>

          <nav class="menu">
            <a class="menu-link" href="https://github.com/4RK4S" target="_blank" rel="noopener noreferrer">
              <span class="icon">⌘</span>
              <span class="label">./github.sh</span>
            </a>

            <a class="menu-link" href="/discord">
              <span class="icon">✦</span>
              <span class="label">./discord.sh</span>
            </a>

            <a class="menu-link full" href="/mail">
              <span class="icon">✉</span>
              <span class="label">./mail.sh</span>
            </a>
          </nav>

          <div class="hint">
            $ cat ./about.txt<br />
            Building Python tools, Discord bots, automation scripts and web utilities.
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const text = "curl -X GET https://4rk4s.github.io/";
    const line = document.getElementById("typing-line");

    let index = 0;

    function typeText() {
      if (index < text.length) {
        line.textContent += text.charAt(index);
        index++;
        setTimeout(typeText, 45);
      } else {
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        line.appendChild(cursor);
      }
    }

    window.addEventListener("load", typeText);
  </script>
</body>
</html>
